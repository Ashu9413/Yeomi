<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YEOMI | Fashion Jewelry & Accessories</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #f5f2eb 0%, #e8e1d5 100%);
            color: #333333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 600px; width: 100%; text-align: center; animation: fadeIn 1s ease-in-out; }
        header { margin-bottom: 30px; }
        .brand-logo { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 400; letter-spacing: 4px; color: #2c2c2c; margin-bottom: 5px; }
        .tagline { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #777777; font-weight: 300; }
        .hero-card { background: #ffffff; padding: 40px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.8); }
        .brand-aesthetic { width: 70px; height: 2px; background-color: #c5a880; margin: 0 auto 25px auto; }
        .hero-card h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; color: #3a3a3a; margin-bottom: 15px; }
        .hero-card p { font-size: 0.95rem; line-height: 1.6; color: #666666; margin-bottom: 30px; font-weight: 300; }
        .cta-button { display: inline-flex; align-items: center; justify-content: center; gap: 10px; background-color: #2c2c2c; color: #ffffff; text-decoration: none; padding: 14px 35px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); }
        .cta-button:hover { background-color: #c5a880; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(197, 168, 128, 0.3); }
        footer { margin-top: 40px; font-size: 0.8rem; color: #888888; letter-spacing: 1px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { .brand-logo { font-size: 2.8rem; } .hero-card { padding: 30px 20px; } .hero-card h2 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="brand-logo">YEOMI</h1>
            <p class="tagline">Exquisite Fashion Jewelry & Accessories</p>
        </header>
        <main>
            <div class="hero-card">
                <div class="brand-aesthetic"></div>
                <h2>Elevate Your Everyday Style</h2>
                <p>Discover curated pieces designed to add a touch of elegance to your look. Explore our latest collection exclusively on Instagram.</p>
                <a href="https://www.instagram.com/yeomi.in.1" target="_blank" class="cta-button">
                    <span>Explore Collection</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </a>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 YEOMI. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
