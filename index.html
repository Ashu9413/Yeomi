<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEOMI.IN.1</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffd6e7,#fff0f5);
    color:#333;
}

/* Header */
header{
    text-align:center;
    padding:20px;
    background:#ffb6c1;
    color:white;
    font-size:22px;
    font-weight:bold;
}

/* Hero */
.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    font-size:30px;
    color:#d63384;
}

.hero p{
    font-size:16px;
}

/* Buttons */
.btn{
    display:inline-block;
    padding:10px 20px;
    margin:10px;
    border-radius:25px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.whatsapp{
    background:#25D366;
}

.insta{
    background:#E1306C;
}

/* Products */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
    border-radius:10px;
}

footer{
    text-align:center;
    padding:15px;
    background:#ffb6c1;
    color:white;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
🌸 YEOMI Beauty Store 🌸
</header>

<div class="hero">
<h1>Welcome to Our Store</h1>
<p>Cute aesthetic beauty & skincare products 💖</p>

<a class="btn whatsapp" href="https://wa.me/91XXXXXXXXXX" target="_blank">
Order on WhatsApp
</a>

<a class="btn insta" href="https://instagram.com/YEOMI.IN.1" target="_blank">
Instagram
</a>
</div>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Product 1</h3>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Product 2</h3>
</div>

<div class="card">
<img src="https://via.placeholder.com/150">
<h3>Product 3</h3>
</div>

</div>

<footer>
© 2026 YEOMI.IN.1 | All Rights Reserved
</footer>

</body>
</html>
